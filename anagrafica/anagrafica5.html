<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Anagrafica 5.0</title>
</head>

<body>

<h3>Inserisci i tuoi dati</h3>

Nome: <input type="text" id="nome"><br><br>
Cognome: <input type="text" id="cognome"><br><br>
Età: <input type="number" id="eta"><br><br>
Città: <input type="text" id="citta"><br><br>
Provincia: <input type="text" id="provincia"><br><br>
CAP: <input type="text" id="cap"><br><br>
Nazione: <input type="text" id="nazione"><br><br>
Email: <input type="text" id="email"><br><br>
Telefono: <input type="text" id="telefono"><br><br>

<input type="button" value="Salva Dati" onclick="salva()">
<input type="button" value="Azzera Dati" onclick="resetta()">

<h3>Dati Salvati</h3>
<div id="tabella"></div>

<script>

let collection;

try {
    collection = JSON.parse(localStorage.getItem("collection")) || [];
} catch(e) {
    collection = [];
}

function salva() {

    const dati = {
        nome: document.getElementById("nome").value.trim(),
        cognome: document.getElementById("cognome").value.trim(),
        eta: document.getElementById("eta").value.trim(),
        citta: document.getElementById("citta").value.trim(),
        provincia: document.getElementById("provincia").value.trim(),
        cap: document.getElementById("cap").value.trim(),
        nazione: document.getElementById("nazione").value.trim(),
        email: document.getElementById("email").value.trim(),
        telefono: document.getElementById("telefono").value.trim()
    };

    const regNome = /^[A-Za-zÀ-ÿ\s]+$/;
    const regCap = /^[0-9]{5}$/;
    const regCitta = /^[A-Za-zÀ-ÿ\s]+$/;
    const regMail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const regTel = /^[0-9]{8,15}$/;

    if (!regNome.test(dati.nome)) {
        alert("Nome non valido");
        return;
    }

    if (!regNome.test(dati.cognome)) {
        alert("Cognome non valido");
        return;
    }

    if (!regCitta.test(dati.citta)) {
        alert("Città non valida");
        return;
    }

    if (!regCap.test(dati.cap)) {
        alert("CAP non valido");
        return;
    }

    if (!regMail.test(dati.email)) {
        alert("Email non valida");
        return;
    }

    if (!regTel.test(dati.telefono)) {
        alert("Telefono non valido");
        return;
    }

    collection.push(dati);

    localStorage.setItem("collection", JSON.stringify(collection));

    aggiornaTabella();
    pulisciCampi();
}

function aggiornaTabella() {

    if (collection.length === 0) {
        document.getElementById("tabella").innerHTML = "Nessun dato salvato";
        return;
    }

    let tab = "<table border='1'><tr>" +
    "<th>Nome</th>" +
    "<th>Cognome</th>" +
    "<th>Età</th>" +
    "<th>Città</th>" +
    "<th>Provincia</th>" +
    "<th>CAP</th>" +
    "<th>Nazione</th>" +
    "<th>Email</th>" +
    "<th>Telefono</th>" +
    "</tr>";

    for (let i = 0; i < collection.length; i++) {

        let r = collection[i];

        tab += "<tr>" +
        "<td>"+r.nome+"</td>" +
        "<td>"+r.cognome+"</td>" +
        "<td>"+r.eta+"</td>" +
        "<td>"+r.citta+"</td>" +
        "<td>"+r.provincia+"</td>" +
        "<td>"+r.cap+"</td>" +
        "<td>"+r.nazione+"</td>" +
        "<td>"+r.email+"</td>" +
        "<td>"+r.telefono+"</td>" +
        "</tr>";
    }

    tab += "</table>";

    document.getElementById("tabella").innerHTML = tab;
}

function pulisciCampi() {

    document.getElementById("nome").value="";
    document.getElementById("cognome").value="";
    document.getElementById("eta").value="";
    document.getElementById("citta").value="";
    document.getElementById("provincia").value="";
    document.getElementById("cap").value="";
    document.getElementById("nazione").value="";
    document.getElementById("email").value="";
    document.getElementById("telefono").value="";
}

function resetta() {

    localStorage.removeItem("collection");
    collection=[];
    aggiornaTabella();
}

aggiornaTabella();

</script>

</body>
</html>
