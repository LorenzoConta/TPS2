<!DOCTYPE html>
<html>
<head>
  <title>Anagrafica 5.0</title>
  <style>
   body {
      background: #ffe4b5;
      font-family: Arial, sans-serif;
      color: #333;
      padding: 30px;
    }

    input[type="text"],
    input[type="number"] {
      padding: 6px;
      margin-bottom: 8px;
      border-radius: 5px;
      border: 1px solid #888;
      width: 200px;
    }

    input[type="button"] {
      padding: 8px 15px;
      background-color: #0080ff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    input[type="button"]:hover {
      background-color: #0059b3;
    }

    table {
      background: #ffffff;
      border-radius: 8px;
      margin-top: 20px;
      border-collapse: collapse;
      width: 80%;
    }

    th {
      background-color: #0080ff;
      color: white;
      padding: 8px;
    }

    td {
      padding: 8px;
      text-align: center;
    }

    tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    tr:nth-child(odd) {
      background-color: #ffffff;
    }
  </style>
</head>
<body>

  <input type="text" id="nome" placeholder="Nome"><br>
  <input type="text" id="cognome" placeholder="Cognome"><br>
  <input type="number" id="eta" placeholder="Età"><br>
  <input type="text" id="citta" placeholder="Città"><br>
  <input type="text" id="provincia" placeholder="Provincia (MI)"><br>
  <input type="text" id="nazione" placeholder="Nazione"><br>

  <input type="button" value="Inserisci" onclick="ana()">

  <table border="1">
    <thead>
      <tr>
        <th>Nome</th>
        <th>Cognome</th>
        <th>Età</th>
        <th>Città</th>
        <th>Provincia</th>
        <th>Nazione</th>
      </tr>
    </thead>
    <tbody id="cont"></tbody>
  </table>

  <script>
    let elementi = JSON.parse(localStorage.getItem("elenco"));
    if (elementi === null) elementi = [];

    const regexNome = /^[a-zA-Z' ]+$/;
    const regexCognome = /^[a-zA-Z' ]+$/;
    const regexEta = /^(?:1[01][0-9]|120|[0-9]{1,2})$/;
    const regexCitta = /^[a-zA-Z ]+$/;
    const regexProvincia = /^[A-Z]{2}$/;
    const regexNazione = /^[a-zA-Z ]+$/;

    function aggiungiRiga(p) {
      let tr = document.createElement("tr");
      tr.innerHTML =
        "<td>" + p.nome + "</td>" +
        "<td>" + p.cognome + "</td>" +
        "<td>" + p.eta + "</td>" +
        "<td>" + p.citta + "</td>" +
        "<td>" + p.provincia + "</td>" +
        "<td>" + p.nazione + "</td>";
      document.getElementById("cont").appendChild(tr);
    }
    function ana() {
      let nome = document.getElementById("nome").value.trim();
      let cognome = document.getElementById("cognome").value.trim();
      let eta = document.getElementById("eta").value.trim();
      let citta = document.getElementById("citta").value.trim();
      let provincia = document.getElementById("provincia").value.trim().toUpperCase();
      let nazione = document.getElementById("nazione").value.trim();

      if (!regexNome.test(nome)) return alert("Nome non valido!");
      if (!regexCognome.test(cognome)) return alert("Cognome non valido!");
      if (!regexEta.test(eta)) return alert("Età non valida!");
      if (!regexCitta.test(citta)) return alert("Città non valida!");
      if (!regexProvincia.test(provincia)) return alert("Provincia non valida! (es: MI)");
      if (!regexNazione.test(nazione)) return alert("Nazione non valida!");

      const persona = { nome, cognome, eta, citta, provincia, nazione };
      elementi.push(persona);
      localStorage.setItem("elenco", JSON.stringify(elementi));

      aggiungiRiga(persona);
      document.getElementById("nome").value = "";
      document.getElementById("cognome").value = "";
      document.getElementById("eta").value = "";
      document.getElementById("citta").value = "";
      document.getElementById("provincia").value = "";
      document.getElementById("nazione").value = "";
    }
    let s = JSON.parse(localStorage.getItem("elenco"));
    if (s !== null) {
      for (let i = 0; i < s.length; i++) {
        aggiungiRiga(s[i]);
      }
    }
  </script>

</body>
</html>
