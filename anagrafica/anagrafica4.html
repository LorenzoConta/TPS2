<!DOCTYPE html>
<html><head>
  <title>Anagrafica 4.0</title>
  <style>
    body {
      background: linear-gradient(135deg, #74ebd5, #9face6);
      font-family: Arial, sans-serif;
      color: #333;
      padding: 30px;
    }

    input[type="text"],
    input[type="number"] {
      padding: 6px;
      margin-bottom: 8px;
      border-radius: 5px;
      border: 1px solid #aaa;
      width: 200px;
    }

    input[type="button"] {
      padding: 8px 15px;
      background-color: #6a5acd;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    table {
      background: white;
      border-radius: 8px;
      margin-top: 20px;
      border-collapse: collapse;
      width: 80%;
    }

    th {
      background-color: #6a5acd;
      color: white;
      padding: 8px;
    }

    td {
      padding: 8px;
      text-align: center;
    }
  </style>
<style type="text/css" id="operaUserStyle"></style><style type="text/css"></style></head>
<body>

  <input type="text" id="nome"> Nome<br>
  <input type="text" id="cognome"> cognome<br>
  <input type="number" id="eta"> eta<br>
  <input type="text" id="citta"> citta<br>
  <input type="text" id="provincia"> provincia<br>
  <input type="text" id="nazione"> nazione<br>

  <input type="button" value="inserisci" onclick="ana()">

  <script>
    let elementi = JSON.parse(localStorage.getItem("elenco"));
    if (elementi === null) {
      elementi = [];
    }

    function ana() {
      let nome = document.getElementById("nome").value;
      let cognome = document.getElementById("cognome").value;
      let eta = document.getElementById("eta").value;
      let citta = document.getElementById("citta").value;
      let provincia = document.getElementById("provincia").value;
      let nazione = document.getElementById("nazione").value;

      const persone = {};
      persone.nome = nome;
      persone.cognome = cognome;
      persone.eta = eta;
      persone.citta = citta;
      persone.provincia = provincia;
      persone.nazione = nazione;

      elementi.push(persone);
      localStorage.setItem("elenco", JSON.stringify(elementi));

      let tr = document.createElement("tr");

      tr.innerHTML =
        "<td>" + nome + "</td>" +
        "<td>" + cognome + "</td>" +
        "<td>" + eta + "</td>" +
        "<td>" + citta + "</td>" +
        "<td>" + provincia + "</td>" +
        "<td>" + nazione + "</td>";

      document.getElementById("cont").appendChild(tr);
    }
  </script>

  <table border="1">
    <tbody><tr>
      <th>Nome</th>
      <th>Cognome</th>
      <th>Età</th>
      <th>Città</th>
      <th>Provincia</th>
      <th>Nazione</th>
    </tr>
    </tbody><tbody id="cont"></tbody>
  </table>

  <script>
    let cont = document.getElementById("cont");
    let s = JSON.parse(localStorage.getItem("elenco"));

    if (s !== null) {
      for (let i = 0; i < s.length; i++) {
        let tr = document.createElement("tr");

        tr.innerHTML =
          "<td>" + s[i].nome + "</td>" +
          "<td>" + s[i].cognome + "</td>" +
          "<td>" + s[i].eta + "</td>" +
          "<td>" + s[i].citta + "</td>" +
          "<td>" + s[i].provincia + "</td>" +
          "<td>" + s[i].nazione + "</td>";

        cont.appendChild(tr);
      }
    }
  </script>



</body></html>
